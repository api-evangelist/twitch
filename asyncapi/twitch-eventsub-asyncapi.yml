      title: Channel Subscription Message Event
      contentType: application/json
      payload:
        $ref: '#/components/schemas/EventSubNotification'
    ChannelCheerEvent:
      name: ChannelCheerEvent
      title: Channel Cheer Event
      contentType: application/json
      payload:
        $ref: '#/components/schemas/EventSubNotification'
    ChannelRaidEvent:
      name: ChannelRaidEvent
