      contentType: application/json
      payload:
        $ref: '#/components/schemas/EventSubNotification'
  schemas:
    EventSubNotification:
      type: object
      description: Standard EventSub notification envelope
      properties:
        subscription:
          type: object
          properties:
            id:
              type: string
              description: Unique subscription ID
            status:
              type: string
              description: Subscription status
            type:
              type: string
              description: The subscription event type
            version:
              type: string
              description: Version of the subscription type
            condition:
              type: object
              additionalProperties:
                type: string
              description: Conditions the subscription was created with
            transport:
              type: object
              properties:
                method:
                  type: string
                  enum: [webhook, websocket, conduit]
                callback:
                  type: string
            cost:
              type: integer
            created_at:
              type: string
              format: date-time
        event:
          type: object
          description: The event-specific payload (varies by subscription type)
          additionalProperties: true
    ChannelUpdatePayload:
      type: object
      properties:
        broadcaster_user_id:
          type: string
        broadcaster_user_login:
          type: string
        broadcaster_user_name:
          type: string
        title:
          type: string
        language:
          type: string
        category_id:
          type: string
        category_name:
          type: string
        content_classification_labels:
          type: array
          items:
            type: string
    ChannelFollowPayload:
      type: object
      properties:
        user_id:
          type: string
        user_login:
          type: string
        user_name:
          type: string
        broadcaster_user_id:
          type: string
        broadcaster_user_login:
          type: string
        broadcaster_user_name:
          type: string
        followed_at:
          type: string
          format: date-time
    ChannelSubscribePayload:
      type: object
      properties:
        user_id:
          type: string
        user_login:
          type: string
        user_name:
          type: string
        broadcaster_user_id:
          type: string
        broadcaster_user_login:
          type: string
        broadcaster_user_name:
          type: string
        tier:
          type: string
          enum: ['1000', '2000', '3000']
        is_gift:
          type: boolean
    ChannelCheerPayload:
      type: object
      properties:
        is_anonymous:
          type: boolean
        user_id:
          type: string
          nullable: true
        user_login:
          type: string
          nullable: true
        user_name:
          type: string
          nullable: true
        broadcaster_user_id:
          type: string
        broadcaster_user_login:
          type: string
        broadcaster_user_name:
          type: string
        message:
          type: string
        bits:
          type: integer
    ChannelRaidPayload:
      type: object
      properties:
        from_broadcaster_user_id:
          type: string
        from_broadcaster_user_login:
          type: string
        from_broadcaster_user_name:
          type: string
        to_broadcaster_user_id:
          type: string
        to_broadcaster_user_login:
          type: string
        to_broadcaster_user_name:
          type: string
        viewers:
          type: integer
    ChannelBanPayload:
      type: object
      properties:
        user_id:
          type: string
        user_login:
          type: string
        user_name:
          type: string
        broadcaster_user_id:
          type: string
        broadcaster_user_login:
          type: string
        broadcaster_user_name:
          type: string
        moderator_user_id:
          type: string
        moderator_user_login:
          type: string
        moderator_user_name:
          type: string
        reason:
          type: string
        banned_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
          nullable: true
        is_permanent:
          type: boolean
    StreamOnlinePayload:
      type: object
      properties:
        id:
          type: string
        broadcaster_user_id:
          type: string
        broadcaster_user_login:
          type: string
        broadcaster_user_name:
          type: string
        type:
          type: string
          enum: [live, playlist, watch_party, premiere, rerun]
        started_at:
          type: string
          format: date-time
    StreamOfflinePayload:
      type: object
      properties:
        broadcaster_user_id:
          type: string
        broadcaster_user_login:
          type: string
        broadcaster_user_name:
          type: string
    DropEntitlementGrantPayload:
      type: object
      properties:
        id:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              organization_id:
                type: string
              category_id:
                type: string
              category_name:
                type: string
              campaign_id:
                type: string
              user_id:
                type: string
              user_name:
                type: string
              user_login:
                type: string
              entitlement_id:
                type: string
              benefit_id:
                type: string
              created_at:
                type: string
                format: date-time
    WebSocketSessionMessage:
      type: object
      description: WebSocket session welcome message
      properties:
        metadata:
          type: object
          properties:
            message_id:
              type: string
            message_type:
              type: string
              enum: [session_welcome, session_keepalive, notification, session_reconnect, revocation]
            message_timestamp:
              type: string
              format: date-time
        payload:
          type: object
          properties:
            session:
              type: object
              properties:
                id:
                  type: string
                status:
                  type: string
                connected_at:
                  type: string
                  format: date-time
                keepalive_timeout_seconds:
                  type: integer
                reconnect_url:
                  type: string
                  nullable: true
