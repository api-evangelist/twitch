openapi: 3.1.0
info:
  title: Twitch Helix API
  description: >-
    The Twitch Helix API provides programmatic access to Twitch platform
    features including streams, users, videos, clips, channels, chat,
    subscriptions, moderation, polls, predictions, and more.
  version: '1.0'
  contact:
    name: Twitch Developer Support
    url: https://dev.twitch.tv/support/
  termsOfService: https://www.twitch.tv/p/legal/terms-of-service/
externalDocs:
  description: Twitch API Reference
  url: https://dev.twitch.tv/docs/api/reference
servers:
  - url: https://api.twitch.tv/helix
    description: Twitch Helix API Production
tags:
  - name: Ads
    description: Manage and start commercial ad breaks
  - name: Bits
    description: Retrieve Bits leaderboard and Cheermote information
  - name: Channels
    description: Manage channel information and editors
  - name: Channel Points
    description: Manage custom channel point rewards and redemptions
  - name: Charity
    description: Retrieve charity campaign information
  - name: Chat
    description: Manage chat settings, emotes, badges, and announcements
  - name: Clips
    description: Create and retrieve clips
  - name: Entitlements
    description: Manage entitlement grants for Drops
  - name: Games
    description: Retrieve game/category information
  - name: Goals
    description: Retrieve creator goals
  - name: Guest Star
    description: Manage Guest Star sessions
  - name: Hype Train
    description: Retrieve Hype Train events
  - name: Moderation
    description: Manage channel moderation including bans, blocks, and AutoMod
  - name: Polls
    description: Create and manage channel polls
  - name: Predictions
    description: Create and manage channel predictions
  - name: Raids
    description: Start and cancel raids
  - name: Schedule
    description: Manage channel stream schedules
  - name: Search
    description: Search for channels and categories
  - name: Streams
    description: Retrieve stream information and markers
  - name: Subscriptions
    description: Retrieve subscription information
  - name: Teams
    description: Retrieve team information
  - name: Users
    description: Manage user information and blocks
  - name: Videos
    description: Manage and retrieve videos
  - name: Whispers
    description: Send whisper messages
  - name: EventSub
    description: Manage EventSub subscriptions
  - name: Conduits
    description: Manage EventSub conduits and shards
security:
  - oauth2: []
  - appAccessToken: []
paths:
  /channels/ads:
    post:
      operationId: startCommercial
      summary: Start Commercial
      description: Starts a commercial on the specified broadcaster's channel.
      tags:
        - Ads
      parameters:
        - $ref: '#/components/parameters/clientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - broadcaster_id
                - length
              properties:
                broadcaster_id:
                  type: string
                  description: The ID of the broadcaster to run the commercial for
                length:
                  type: integer
                  enum: [30, 60, 90, 120, 150, 180]
                  description: The length of the commercial in seconds
      responses:
        '200':
          description: Commercial started successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Commercial'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /bits/leaderboard:
    get:
      operationId: getBitsLeaderboard
      summary: Get Bits Leaderboard
      description: Gets the Bits leaderboard for the authenticated broadcaster.
      tags:
        - Bits
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: count
          in: query
          schema:
            type: integer
            default: 10
            maximum: 100
          description: Number of results to return
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month, year, all]
          description: Time period for the leaderboard
        - name: started_at
          in: query
          schema:
            type: string
            format: date-time
          description: Start date for the leaderboard period
        - name: user_id
          in: query
          schema:
            type: string
          description: Filter by specific user ID
      responses:
        '200':
          description: Bits leaderboard returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BitsLeaderboardEntry'
                  date_range:
                    type: object
                    properties:
                      started_at:
                        type: string
                        format: date-time
                      ended_at:
                        type: string
                        format: date-time
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
  /bits/cheermotes:
    get:
      operationId: getCheermotes
      summary: Get Cheermotes
      description: Gets a list of Cheermotes that users can use to cheer Bits.
      tags:
        - Bits
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          schema:
            type: string
          description: The ID of the broadcaster whose Cheermotes to retrieve
      responses:
        '200':
          description: Cheermotes returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Cheermote'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /channels:
    get:
      operationId: getChannelInformation
      summary: Get Channel Information
      description: Gets information about one or more channels.
      tags:
        - Channels
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          required: true
          schema:
            type: string
          description: The ID of the broadcaster
      responses:
        '200':
          description: Channel information returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      operationId: modifyChannelInformation
      summary: Modify Channel Information
      description: Updates a channel's properties.
      tags:
        - Channels
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          required: true
          schema:
            type: string
          description: The ID of the broadcaster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                game_id:
                  type: string
                  description: The current game/category ID
                broadcaster_language:
                  type: string
                  description: The language of the channel (BCP 47)
                title:
                  type: string
                  description: The title of the stream
                delay:
                  type: integer
                  description: Stream delay in seconds
                tags:
                  type: array
                  items:
                    type: string
                  description: Channel tags
      responses:
        '204':
          description: Channel updated successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /channels/editors:
    get:
      operationId: getChannelEditors
      summary: Get Channel Editors
      description: Gets a list of users who are editors for the specified channel.
      tags:
        - Channels
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Channel editors returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChannelEditor'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /channels/followers:
    get:
      operationId: getChannelFollowers
      summary: Get Channel Followers
      description: Gets a list of users that follow the specified broadcaster.
      tags:
        - Channels
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          required: true
          schema:
            type: string
        - name: user_id
          in: query
          schema:
            type: string
          description: Filter by specific follower user ID
        - $ref: '#/components/parameters/first'
        - $ref: '#/components/parameters/after'
      responses:
        '200':
          description: Followers returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Follower'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
  /channel_points/custom_rewards:
    get:
      operationId: getCustomRewards
      summary: Get Custom Reward
      description: Gets a list of custom rewards for the specified broadcaster.
      tags:
        - Channel Points
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          required: true
          schema:
            type: string
        - name: id
          in: query
          schema:
            type: string
        - name: only_manageable_rewards
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Custom rewards returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomReward'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createCustomReward
      summary: Create Custom Rewards
      description: Creates a custom reward for the specified broadcaster.
      tags:
        - Channel Points
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomRewardInput'
      responses:
        '200':
          description: Custom reward created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomReward'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /charity/campaigns:
    get:
      operationId: getCharityCampaign
      summary: Get Charity Campaign
      description: Gets information about the broadcaster's active charity campaign.
      tags:
        - Charity
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Charity campaign returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CharityCampaign'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /chat/emotes:
    get:
      operationId: getChannelEmotes
      summary: Get Channel Emotes
      description: Gets the list of emotes available for the specified channel.
      tags:
        - Chat
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Channel emotes returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Emote'
                  template:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
  /chat/emotes/global:
    get:
      operationId: getGlobalEmotes
      summary: Get Global Emotes
      description: Gets all global emotes available on Twitch.
      tags:
        - Chat
      parameters:
        - $ref: '#/components/parameters/clientId'
      responses:
        '200':
          description: Global emotes returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Emote'
                  template:
                    type: string
  /chat/emotes/set:
    get:
      operationId: getEmoteSets
      summary: Get Emote Sets
      description: Gets emotes for one or more specified emote sets.
      tags:
        - Chat
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: emote_set_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Emote sets returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Emote'
                  template:
                    type: string
  /chat/badges:
    get:
      operationId: getChannelChatBadges
      summary: Get Channel Chat Badges
      description: Gets the chat badges for the specified channel.
      tags:
        - Chat
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Chat badges returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChatBadgeSet'
  /chat/badges/global:
    get:
      operationId: getGlobalChatBadges
      summary: Get Global Chat Badges
      description: Gets Twitch's list of global chat badges.
      tags:
        - Chat
      parameters:
        - $ref: '#/components/parameters/clientId'
      responses:
        '200':
          description: Global chat badges returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChatBadgeSet'
  /chat/settings:
    get:
      operationId: getChatSettings
      summary: Get Chat Settings
      description: Gets the chat settings for the specified broadcaster's channel.
      tags:
        - Chat
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          required: true
          schema:
            type: string
        - name: moderator_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Chat settings returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChatSettings'
    patch:
      operationId: updateChatSettings
      summary: Update Chat Settings
      description: Updates the chat settings for the specified broadcaster's channel.
      tags:
        - Chat
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          required: true
          schema:
            type: string
        - name: moderator_id
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatSettingsUpdate'
      responses:
        '200':
          description: Chat settings updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChatSettings'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /chat/announcements:
    post:
      operationId: sendChatAnnouncement
      summary: Send Chat Announcement
      description: Sends an announcement to the broadcaster's chat room.
      tags:
        - Chat
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          required: true
          schema:
            type: string
        - name: moderator_id
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  description: The announcement message
                color:
                  type: string
                  enum: [blue, green, orange, purple, primary]
      responses:
        '204':
          description: Announcement sent successfully
        '400':
          $ref: '#/components/responses/BadRequest'
  /chat/chatters:
    get:
      operationId: getChatters
      summary: Get Chatters
      description: Gets the list of users in the specified broadcaster's chat.
      tags:
        - Chat
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          required: true
          schema:
            type: string
        - name: moderator_id
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/first'
        - $ref: '#/components/parameters/after'
      responses:
        '200':
          description: Chatters returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Chatter'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  total:
                    type: integer
  /chat/messages:
    post:
      operationId: sendChatMessage
      summary: Send Chat Message
      description: Sends a message to the broadcaster's chat room.
      tags:
        - Chat
      parameters:
        - $ref: '#/components/parameters/clientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - broadcaster_id
                - sender_id
                - message
              properties:
                broadcaster_id:
                  type: string
                sender_id:
                  type: string
                message:
                  type: string
                reply_parent_message_id:
                  type: string
      responses:
        '200':
          description: Message sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        message_id:
                          type: string
                        is_sent:
                          type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
  /clips:
    get:
      operationId: getClips
      summary: Get Clips
      description: Gets one or more video clips by clip ID, broadcaster, or game.
      tags:
        - Clips
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          schema:
            type: string
        - name: game_id
          in: query
          schema:
            type: string
        - name: id
          in: query
          schema:
            type: string
        - name: started_at
          in: query
          schema:
            type: string
            format: date-time
        - name: ended_at
          in: query
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/first'
        - $ref: '#/components/parameters/after'
        - $ref: '#/components/parameters/before'
      responses:
        '200':
          description: Clips returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Clip'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createClip
      summary: Create Clip
      description: Creates a clip from the broadcaster's stream.
      tags:
        - Clips
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          required: true
          schema:
            type: string
        - name: has_delay
          in: query
          schema:
            type: boolean
      responses:
        '202':
          description: Clip creation initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        edit_url:
                          type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
  /entitlements/drops:
    get:
      operationId: getDropsEntitlements
      summary: Get Drops Entitlements
      description: Gets an organization's list of entitlements granted to users.
      tags:
        - Entitlements
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: id
          in: query
          schema:
            type: string
        - name: user_id
          in: query
          schema:
            type: string
        - name: game_id
          in: query
          schema:
            type: string
        - name: fulfillment_status
          in: query
          schema:
            type: string
            enum: [CLAIMED, FULFILLED]
        - $ref: '#/components/parameters/first'
        - $ref: '#/components/parameters/after'
      responses:
        '200':
          description: Entitlements returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DropsEntitlement'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
  /games:
    get:
      operationId: getGames
      summary: Get Games
      description: Gets information about one or more games/categories.
      tags:
        - Games
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: id
          in: query
          schema:
            type: string
          description: The game/category ID
        - name: name
          in: query
          schema:
            type: string
          description: The game/category name
        - name: igdb_id
          in: query
          schema:
            type: string
          description: The IGDB ID of the game
      responses:
        '200':
          description: Games returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Game'
        '400':
          $ref: '#/components/responses/BadRequest'
  /games/top:
    get:
      operationId: getTopGames
      summary: Get Top Games
      description: Gets games sorted by number of current viewers, most popular first.
      tags:
        - Games
      parameters:
        - $ref: '#/components/parameters/clientId'
        - $ref: '#/components/parameters/first'
        - $ref: '#/components/parameters/after'
        - $ref: '#/components/parameters/before'
      responses:
        '200':
          description: Top games returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Game'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
  /goals:
    get:
      operationId: getCreatorGoals
      summary: Get Creator Goals
      description: Gets the broadcaster's list of active goals.
      tags:
        - Goals
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Creator goals returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CreatorGoal'
  /hypetrain/events:
    get:
      operationId: getHypeTrainEvents
      summary: Get Hype Train Events
      description: Gets the information of the most recent Hype Train of the specified broadcaster.
      tags:
        - Hype Train
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/first'
        - $ref: '#/components/parameters/after'
      responses:
        '200':
          description: Hype Train events returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/HypeTrainEvent'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
  /moderation/banned:
    get:
      operationId: getBannedUsers
      summary: Get Banned Users
      description: Gets all users that the broadcaster has banned or timed out.
      tags:
        - Moderation
      parameters:
        - $ref: '#/components/parameters/clientId'
        - name: broadcaster_id
          in: query
          required: true
          schema:
            type: string
        - name: user_id
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/first'
        - $ref: '#/components/parameters/after'
        - $ref: '#/components/parameters/before'
      responses:
        '200':
          description: Banned users returned successfully
